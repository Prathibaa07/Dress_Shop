<html>
  <head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body{
        background-image: url("BalaPic3\ -\ Copy.jpg");
        background-size: cover;
      }
      .card-custom{
        max-width: 400px;
        margin: auto;
        background-size: cover;
        position: relative;
        height: 450px;
        width: 900px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      h1{
        color: rgb(39, 118, 245);
        text-decoration: underline;
      }
      .box{
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        padding: 20px;
        border-radius: 10px;
        color: #fff;
      }
      button{
        height:32px;
        width:300px;
        background-color: rgb(64, 125, 224);
        border: rgb(64, 125, 224);
        border-radius: 10px;
        font-weight: bold;
      }
      label{
        color: black;
      }
      
      h4{
        color: black;
      }
      center{
        color: black;
      }
    
    </style>
  </head>
  <body>
    <div class="container py-5">
        <br>
        <br>
        <br>
        <br>
        <br>
        <br>
       <div class="card-custom shadow-lg">
        <div class="box">
            <h1 class="text-center text-mb-8">LOGIN</h1>
                <form name="post">
                    <thead>
                    <div class="form-group mt-3 mb-3">
                                <label for="name">Username:</label>
                                <input type="text" class="form-control" id="name" placeholder="Enter Your Username:">
                            </div>

                            <div class="form-group">
                                <label for="password">Password:</label>
                                <input type="password" class="form-control" id="email" placeholder="Enter Your Password:">
                            </div>
                    </thead>
                </form>
        <div class="text-center btn-success rounded-pill">
            <button type="submit"> <a href="ECommerce Website.html"><h4>LOGIN</h4></a></button>
        </div><br>
        <center>
          New Reason? <a href="Signup.html"> SignUp</a>
        </center>
        </div>
       </div>
    </div>
  </body>
</html>
